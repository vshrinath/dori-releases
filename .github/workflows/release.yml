name: Build & Publish Release

# This repo is PUBLIC and exists only to host downloadable artifacts + the Tauri
# updater manifest (latest.json). The actual code lives in the private
# dori-engine / dori-portal repos, which are checked out here at the release tag.
#
# Triggered by:
#  - repository_dispatch (event_type: release) fired from dori-engine on a v* tag
#  - workflow_dispatch (manual) with a tag input — use this for the first test run
#
# A tag containing a hyphen (e.g. v1.7.0-beta.1) is published as a PRERELEASE,
# which is what the portal /api/update beta channel serves.
#
# Build flow:
#   checkout → get SHAs → restore component caches → build only what's missing
#   → cargo tauri build → sign → publish DMG + latest.json + components.json
#
# Cache keys are git SHAs so unchanged components are never rebuilt, even across
# different release tags. Users skip downloads for unchanged components via sha256
# comparison in the in-app component updater.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (must already exist on dori-engine + dori-portal), e.g. v1.7.0'
        required: true
  repository_dispatch:
    types: [release]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    env:
      TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}

    steps:
      # Paths MUST be siblings: portal's build:tauri copies into ../dori-engine/desktop/...
      # and build-sidecars.mjs looks for processing at ../dori-processing-services.
      - name: Checkout engine (at tag)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-engine
          ref: ${{ env.TAG }}
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-engine

      - name: Checkout portal (at tag)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-portal
          ref: ${{ env.TAG }}
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-portal

      - name: Checkout processing-services (latest main)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-processing-services
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-processing-services

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # Get git SHAs used as cache keys — one per component.
      - name: Get component cache keys
        id: sha
        run: |
          echo "engine=$(git -C dori-engine rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "portal=$(git -C dori-portal rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "proc=$(git -C dori-processing-services rev-parse HEAD 2>/dev/null || echo none)" >> $GITHUB_OUTPUT
          echo "node=$(node --version)" >> $GITHUB_OUTPUT

      # ── Component caches (keyed on git SHA) ───────────────────────────────────
      # Cache hit = component unchanged = skip build, restore directory directly.
      - name: Cache engine sidecar
        id: engine-cache
        uses: actions/cache@v4
        with:
          path: dori-engine/desktop/src-tauri/engine-build
          key: engine-build-${{ steps.sha.outputs.engine }}-${{ steps.sha.outputs.node }}

      - name: Cache portal build
        id: portal-cache
        uses: actions/cache@v4
        with:
          path: dori-engine/desktop/src-tauri/portal-build
          key: portal-build-${{ steps.sha.outputs.portal }}

      - name: Cache processing sidecar
        id: proc-cache
        uses: actions/cache@v4
        with:
          path: dori-engine/desktop/src-tauri/processing-build
          key: processing-build-${{ steps.sha.outputs.proc }}-${{ steps.sha.outputs.node }}

      - name: Cache node runtime
        id: node-cache
        uses: actions/cache@v4
        with:
          path: dori-engine/desktop/src-tauri/node-runtime
          key: node-runtime-${{ steps.sha.outputs.node }}

      # ── Dependencies (only what's needed for uncached components) ─────────────
      - name: Create workspace config
        run: |
          printf 'packages:\n  - dori-engine\n  - dori-engine/packages/*\n  - dori-portal\n  - dori-processing-services\n' > pnpm-workspace.yaml

      - name: Install workspace dependencies
        if: steps.engine-cache.outputs.cache-hit != 'true' || steps.portal-cache.outputs.cache-hit != 'true'
        run: pnpm install

      - name: Install processing-services dependencies
        if: steps.proc-cache.outputs.cache-hit != 'true'
        working-directory: dori-processing-services
        run: npm ci

      # ── Build uncached components ─────────────────────────────────────────────
      # Workspace packages (@dori/*) must be compiled before the portal build.
      - name: Build workspace packages (@dori/*)
        if: steps.portal-cache.outputs.cache-hit != 'true'
        run: pnpm --filter "@dori/*" -r build

      - name: Build portal (build:tauri)
        if: steps.portal-cache.outputs.cache-hit != 'true'
        working-directory: dori-portal
        run: pnpm run build:tauri
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # build-sidecars.mjs reads SKIP_* to skip cached components.
      - name: Build sidecars
        working-directory: dori-engine/desktop
        env:
          SKIP_ENGINE:     ${{ steps.engine-cache.outputs.cache-hit }}
          SKIP_PROCESSING: ${{ steps.proc-cache.outputs.cache-hit }}
          SKIP_NODE:       ${{ steps.node-cache.outputs.cache-hit }}
          DORI_APP_VERSION: ${{ env.TAG }}
        run: node scripts/build-sidecars.mjs

      # ── Publish component archives + components.json ──────────────────────────
      # Done BEFORE the Tauri build so components are available even if cargo fails.
      # Always uploads all four (upload is fast ~30s); sha256 in components.json
      # lets the in-app updater skip unchanged downloads on the user's machine.
      - name: Publish component archives and components.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENGINE_SHA:  ${{ steps.sha.outputs.engine }}
          PORTAL_SHA:  ${{ steps.sha.outputs.portal }}
          PROC_SHA:    ${{ steps.sha.outputs.proc }}
          NODE_VER:    ${{ steps.sha.outputs.node }}
        run: |
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          ENTRIES='{}'

          publish_component() {
            local COMPONENT="$1" SRC="$2" GIT_SHA="$3"
            local ARCHIVE="${COMPONENT}-${VERSION}.tar.gz"

            if [ ! -d "$SRC" ]; then
              echo "⚠ $COMPONENT: $SRC missing, skipping"
              return
            fi

            tar czf "$ARCHIVE" -C "$(dirname "$SRC")" "$(basename "$SRC")"
            SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
            gh release upload "${TAG}" "$ARCHIVE" --clobber -R "$REPO"

            COMP_VERSION="$VERSION"
            if [ -f "$SRC/component-version.json" ]; then
              COMP_VERSION=$(jq -r --arg v "$VERSION" '.version // $v' "$SRC/component-version.json")
            fi

            ENTRIES=$(echo "$ENTRIES" | jq \
              --arg k "$COMPONENT" --arg ver "$COMP_VERSION" \
              --arg sha "$SHA" --arg url "$BASE_URL/$ARCHIVE" --arg git "$GIT_SHA" \
              '.[$k] = {version:$ver, sha256:$sha, url:$url, gitSha:$git}')
            echo "↑ $COMPONENT uploaded ($ARCHIVE, sha256=$SHA)"
          }

          publish_component "engine-server"     "dori-engine/desktop/src-tauri/engine-build"     "$ENGINE_SHA"
          publish_component "portal-server"     "dori-engine/desktop/src-tauri/portal-build"     "$PORTAL_SHA"
          publish_component "processing-server" "dori-engine/desktop/src-tauri/processing-build" "$PROC_SHA"
          publish_component "node-runtime"      "dori-engine/desktop/src-tauri/node-runtime"     "$NODE_VER"

          echo "$ENTRIES" | jq '.' > components.json
          gh release upload "${TAG}" components.json --clobber -R "$REPO"
          echo "Published components.json:"
          cat components.json

      # ── Rust build ────────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: dori-engine/desktop/src-tauri -> target

      # ── Release notes ─────────────────────────────────────────────────────────
      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(awk "/^## ${TAG}/{found=1; next} found && /^## v/{exit} found{print}" \
            dori-engine/docs/RELEASE_NOTES.md | sed '/^[[:space:]]*$/d' | head -20)
          if [ -z "$NOTES" ]; then
            NOTES="See https://github.com/vshrinath/dori-releases/releases/tag/${TAG} for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Tauri build + publish DMG ─────────────────────────────────────────────
      # Reset release body before tauri-action fetches it — multiline notes from a
      # prior run cause "Bad control character in JSON" when tauri-action parses the
      # GitHub API response.
      - name: Reset release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${TAG}" --notes "See assets below to download and install." \
            -R "${{ github.repository }}" 2>/dev/null || true

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: dori-engine/desktop/src-tauri
          tagName: ${{ env.TAG }}
          releaseName: 'Dori ${{ env.TAG }}'
          releaseBody: 'See assets below to download and install.'
          releaseDraft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      # ── Sign + upload latest.json ─────────────────────────────────────────────
      - name: Sign update bundle and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          TAR_GZ=$(find dori-engine/desktop/src-tauri/target -name "*.app.tar.gz" 2>/dev/null | head -1)
          if [ -z "$TAR_GZ" ]; then
            echo "ERROR: no .app.tar.gz found under target/" && exit 1
          fi
          echo "Signing: $TAR_GZ"
          npm install -g @tauri-apps/cli
          tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$TAR_GZ"
          SIG=$(cat "${TAR_GZ}.sig")
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Dori_universal.app.tar.gz"
          NOTES="${{ steps.notes.outputs.notes }}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIG" \
            --arg url "$URL" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:{"darwin-universal":{signature:$sig,url:$url}}}' \
            > latest.json
          gh release upload "${TAG}" latest.json --clobber -R "${{ github.repository }}"

# ── Adding Windows later ──────────────────────────────────────────────────────
# 1. Add `windows-latest` to the matrix.
# 2. Guard darwin-arm64 Node URL and ONNX prune by platform in build-sidecars.mjs.
# 3. Add Windows signing secrets if needed (TAURI_PRIVATE_KEY is cross-platform).
# The portal /api/update route already returns platforms['windows-x86_64'].
