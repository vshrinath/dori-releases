name: Build & Publish Release

# This repo is PUBLIC and exists only to host downloadable artifacts + the Tauri
# updater manifest (latest.json). The actual code lives in the private
# dori-engine / dori-portal repos, which are checked out here at the release tag.
#
# Triggered by:
#  - repository_dispatch (event_type: release) fired from dori-engine on a v* tag
#  - workflow_dispatch (manual) with a tag input — use this for the first test run
#
# A tag containing a hyphen (e.g. v1.7.0-beta.1) is published as a PRERELEASE,
# which is what the portal /api/update beta channel serves.
#
# Build flow:
#   checkout engine + portal (at tag) + processing-services (latest main)
#   → pnpm install (workspace) + npm install (processing)
#   → portal build:tauri → build-sidecars.mjs → cargo tauri build (tauri-action)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (must already exist on dori-engine + dori-portal), e.g. v1.7.0'
        required: true
  repository_dispatch:
    types: [release]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # Add `windows-latest` here to ship Windows — see notes at the bottom.
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # create the release in THIS repo

    env:
      TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}

    steps:
      # Paths MUST be dori-engine/ dori-portal/ dori-processing-services/ (siblings):
      # the portal's build:tauri copies into ../dori-engine/desktop/...
      # and build-sidecars.mjs looks for processing at ../dori-processing-services.
      - name: Checkout engine (at tag)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-engine
          ref: ${{ env.TAG }}
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-engine

      - name: Checkout portal (at tag)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-portal
          ref: ${{ env.TAG }}
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-portal

      # processing-services is not versioned in sync with engine/portal tags yet —
      # check out latest main. Update this to use ${{ env.TAG }} once it's tagged.
      - name: Checkout processing-services (latest main)
        uses: actions/checkout@v4
        with:
          repository: vshrinath/dori-processing-services
          token: ${{ secrets.BUILD_TOKEN }}
          path: dori-processing-services

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # build-sidecars.mjs runs `pnpm deploy --filter dori` from the workspace root.
      # In CI that root is the runner workspace, so we need a minimal workspace config.
      - name: Create workspace config
        run: |
          printf 'packages:\n  - dori-engine\n  - dori-engine/packages/*\n  - dori-portal\n  - dori-processing-services\n' > pnpm-workspace.yaml

      - name: Install workspace dependencies (engine + portal)
        run: pnpm install

      # processing-services uses npm, not pnpm. Install dev deps for the tsc build.
      - name: Install processing-services dependencies
        working-directory: dori-processing-services
        run: npm ci

      # Determine which components changed vs the previous release.
      # Fetches the previous components.json, compares git SHAs, and sets outputs
      # used to skip building unchanged components.
      - name: Determine changed components
        id: changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NODE_VER=$(node --version)

          # Fetch previous components.json (empty object if no prior release)
          PREV=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.assets[] | select(.name=="components.json") | .browser_download_url' 2>/dev/null \
            | xargs curl -sf 2>/dev/null || echo '{}')

          prev_sha() { echo "$PREV" | jq -r --arg k "$1" '.[$k].gitSha // ""'; }
          prev_node() { echo "$PREV" | jq -r '."node-runtime".version // ""'; }

          PORTAL_SHA=$(git -C dori-portal rev-parse HEAD)
          ENGINE_SHA=$(git -C dori-engine rev-parse HEAD)
          PROC_SHA=$(git -C dori-processing-services rev-parse HEAD 2>/dev/null || echo "")

          portal_changed=true; engine_changed=true; proc_changed=true; node_changed=true
          [ "$(prev_sha portal-server)"      = "$PORTAL_SHA" ] && portal_changed=false
          [ "$(prev_sha engine-server)"      = "$ENGINE_SHA"  ] && engine_changed=false
          [ "$(prev_sha processing-server)"  = "$PROC_SHA"    ] && proc_changed=false
          [ "$(prev_node)"                   = "$NODE_VER"    ] && node_changed=false

          echo "portal=$portal_changed"    >> $GITHUB_OUTPUT
          echo "engine=$engine_changed"    >> $GITHUB_OUTPUT
          echo "processing=$proc_changed"  >> $GITHUB_OUTPUT
          echo "node=$node_changed"        >> $GITHUB_OUTPUT
          echo "portal_sha=$PORTAL_SHA"    >> $GITHUB_OUTPUT
          echo "engine_sha=$ENGINE_SHA"    >> $GITHUB_OUTPUT
          echo "proc_sha=$PROC_SHA"        >> $GITHUB_OUTPUT
          echo "node_ver=$NODE_VER"        >> $GITHUB_OUTPUT
          echo "prev_components=$PREV"     >> $GITHUB_OUTPUT

          echo "portal=$portal_changed engine=$engine_changed processing=$proc_changed node=$node_changed"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: dori-engine/desktop/src-tauri -> target

      # Workspace packages (@dori/*) are installed but not compiled after a fresh
      # checkout. The portal's webpack needs their dist/ to resolve imports.
      - name: Build workspace packages (@dori/*)
        run: pnpm --filter "@dori/*" -r build

      - name: Build Next.js portal (build:tauri)
        if: steps.changed.outputs.portal == 'true'
        working-directory: dori-portal
        run: pnpm run build:tauri
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # Bundles engine + processing sidecars and downloads the shared Node runtime.
      # Passes SKIP_* env vars so build-sidecars.mjs skips unchanged components.
      - name: Build sidecars
        working-directory: dori-engine/desktop
        env:
          SKIP_ENGINE: ${{ steps.changed.outputs.engine == 'false' }}
          SKIP_PROCESSING: ${{ steps.changed.outputs.processing == 'false' }}
          SKIP_NODE: ${{ steps.changed.outputs.node == 'false' }}
          DORI_APP_VERSION: ${{ env.TAG }}
        run: node scripts/build-sidecars.mjs

      # Extract user-facing release notes for this version from RELEASE_NOTES.md.
      # These go into the GitHub Release body and latest.json (in-app update dialog).
      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(awk "/^## ${TAG}/{found=1; next} found && /^## v/{exit} found{print}" \
            dori-engine/docs/RELEASE_NOTES.md | sed '/^[[:space:]]*$/d' | head -20)
          if [ -z "$NOTES" ]; then
            NOTES="See https://github.com/vshrinath/dori-releases/releases/tag/${TAG} for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # tauri-action creates/updates the release in THIS (public) repo.
      # No beforeBuildCommand needed — sidecars are already in place from the step above.
      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri v2 signing env var names (v1 used TAURI_PRIVATE_KEY / TAURI_KEY_PASSWORD)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: dori-engine/desktop/src-tauri
          tagName: ${{ env.TAG }}
          releaseName: 'Dori ${{ env.TAG }}'
          releaseBody: ${{ steps.notes.outputs.notes }}
          releaseDraft: false
          # Hyphenated tags (v1.7.0-beta.1) → prerelease → served on the beta channel.
          prerelease: ${{ contains(env.TAG, '-') }}
          updaterJsonKeepUniversal: true
          args: --target universal-apple-darwin

      # tauri-action doesn't generate the .sig file for universal macOS builds, so we
      # sign the update bundle ourselves with cargo tauri signer sign, then build and
      # upload latest.json manually.
      - name: Sign update bundle and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          TAR_GZ=$(find dori-engine/desktop/src-tauri/target -name "*.app.tar.gz" 2>/dev/null | head -1)
          if [ -z "$TAR_GZ" ]; then
            echo "ERROR: no .app.tar.gz found under target/" && exit 1
          fi
          echo "Signing: $TAR_GZ"
          npm install -g @tauri-apps/cli
          tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$TAR_GZ"
          SIG=$(cat "${TAR_GZ}.sig")
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Dori_universal.app.tar.gz"
          NOTES="${{ steps.notes.outputs.notes }}"
          # jq properly escapes newlines and special chars in string values.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg sig "$SIG" \
            --arg url "$URL" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:{"darwin-universal":{signature:$sig,url:$url}}}' \
            > latest.json
          gh release upload "${TAG}" latest.json --clobber -R "${{ github.repository }}"

      # Publish component archives. For each component:
      # - If the git SHA matches the previous release → reuse the previous archive URL (no rebuild, no re-upload)
      # - If changed → tar, sha256, upload the new archive
      # components.json records version + sha256 + url + gitSha for each component.
      - name: Publish component archives and components.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREV_COMPONENTS: ${{ steps.changed.outputs.prev_components }}
          PORTAL_CHANGED:     ${{ steps.changed.outputs.portal }}
          ENGINE_CHANGED:     ${{ steps.changed.outputs.engine }}
          PROCESSING_CHANGED: ${{ steps.changed.outputs.processing }}
          NODE_CHANGED:       ${{ steps.changed.outputs.node }}
          PORTAL_SHA:     ${{ steps.changed.outputs.portal_sha }}
          ENGINE_SHA:     ${{ steps.changed.outputs.engine_sha }}
          PROC_SHA:       ${{ steps.changed.outputs.proc_sha }}
          NODE_VER:       ${{ steps.changed.outputs.node_ver }}
        run: |
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Build components.json entries using jq to accumulate safely.
          ENTRIES='{}'

          publish_component() {
            local COMPONENT="$1" SRC="$2" CHANGED="$3" GIT_SHA="$4"
            local ARCHIVE="${COMPONENT}-${VERSION}.tar.gz"

            if [ "$CHANGED" = "false" ]; then
              # Reuse previous archive URL — component unchanged
              PREV_ENTRY=$(echo "$PREV_COMPONENTS" | jq -r --arg k "$COMPONENT" '.[$k] // empty')
              if [ -n "$PREV_ENTRY" ]; then
                echo "✓ $COMPONENT unchanged — reusing previous archive"
                ENTRIES=$(echo "$ENTRIES" | jq --arg k "$COMPONENT" --argjson v "$PREV_ENTRY" '.[$k] = $v')
                return
              fi
            fi

            if [ ! -d "$SRC" ]; then
              echo "⚠ $COMPONENT: source dir $SRC missing, skipping"
              return
            fi

            echo "↑ $COMPONENT changed — building and uploading archive"
            tar czf "$ARCHIVE" -C "$(dirname "$SRC")" "$(basename "$SRC")"
            SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
            gh release upload "${TAG}" "$ARCHIVE" --clobber -R "$REPO"

            COMP_VERSION="$VERSION"
            if [ -f "$SRC/component-version.json" ]; then
              COMP_VERSION=$(jq -r --arg v "$VERSION" '.version // $v' "$SRC/component-version.json")
            fi

            ENTRIES=$(echo "$ENTRIES" | jq \
              --arg k "$COMPONENT" --arg ver "$COMP_VERSION" \
              --arg sha "$SHA" --arg url "$BASE_URL/$ARCHIVE" --arg git "$GIT_SHA" \
              '.[$k] = {version:$ver, sha256:$sha, url:$url, gitSha:$git}')
          }

          publish_component "engine-server"     "dori-engine/desktop/src-tauri/engine-build"     "$ENGINE_CHANGED"     "$ENGINE_SHA"
          publish_component "portal-server"     "dori-engine/desktop/src-tauri/portal-build"     "$PORTAL_CHANGED"     "$PORTAL_SHA"
          publish_component "processing-server" "dori-engine/desktop/src-tauri/processing-build" "$PROCESSING_CHANGED" "$PROC_SHA"
          publish_component "node-runtime"      "dori-engine/desktop/src-tauri/node-runtime"     "$NODE_CHANGED"       "$NODE_VER"

          echo "$ENTRIES" | jq '.' > components.json
          gh release upload "${TAG}" components.json --clobber -R "$REPO"
          echo "Published components.json"
          cat components.json

# ── Adding Windows later ──────────────────────────────────────────────────────
# 1. Add `windows-latest` to the matrix above.
# 2. Guard the macOS-only `args`/targets so each runner builds its own target.
#    tauri-action merges both platforms into the same latest.json.
# 3. In build-sidecars.mjs: guard the darwin-arm64 Node URL by platform and skip
#    the darwin-arm64 ONNX prune on Windows.
# 4. Add Windows signing secrets if you want to avoid SmartScreen warnings.
#    The TAURI_PRIVATE_KEY updater signature is cross-platform — no change needed.
# The portal /api/update route already returns platforms['windows-x86_64'].
